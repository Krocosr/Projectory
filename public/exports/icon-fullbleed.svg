<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="36" flood-color="#2E2825" flood-opacity="0.18"/>
    </filter>
    <filter id="s2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2E2825" flood-opacity="0.09"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1024" height="1024" rx="0" fill="#F5F1ED"/>

  <g filter="url(#s1)">
    <!-- Card 3 (back) — pushed to fill top-right -->
    <g transform="translate(512,512) rotate(10) translate(-370,-400)">
      <rect width="740" height="860" rx="80" fill="#C8BFB4"/>
    </g>

    <!-- Card 2 (middle) -->
    <g transform="translate(512,512) rotate(4) translate(-390,-420)">
      <rect width="760" height="880" rx="80" fill="#DDD7CE"/>
    </g>

    <!-- Card 1 (front) — near full bleed with safe margin -->
    <g filter="url(#s2)">
      <rect x="60" y="60" width="780" height="900" rx="80" fill="#F5F1ED" stroke="#E0D9CF" stroke-width="2.5"/>

      <!-- Status dot terracotta -->
      <circle cx="152" cy="180" r="52" fill="#C97854"/>

      <!-- Status dot sage -->
      <circle cx="778" cy="140" r="32" fill="#6B9E6E" opacity="0.88"/>

      <!-- Task line 1 -->
      <rect x="100" y="310" width="680" height="76" rx="38" fill="#C97854"/>

      <!-- Task line 2 -->
      <rect x="100" y="414" width="540" height="76" rx="38" fill="#D4906F"/>

      <!-- Task line 3 -->
      <rect x="100" y="518" width="390" height="76" rx="38" fill="#E2B59A"/>

      <!-- Task line 4 -->
      <rect x="100" y="640" width="270" height="52" rx="26" fill="#ECE6DE"/>
      <rect x="100" y="712" width="180" height="38" rx="19" fill="#ECE6DE" opacity="0.55"/>
    </g>
  </g>
</svg>
