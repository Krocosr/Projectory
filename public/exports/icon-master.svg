<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#2E2825" flood-opacity="0.12"/>
    </filter>
    <filter id="cardshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2E2825" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="1024" height="1024" rx="230" fill="#F5F1ED"/>

  <!-- Card 3 (back-most, rotated) -->
  <g transform="translate(512,512) rotate(8) translate(-290,-330)" filter="url(#cardshadow)">
    <rect width="460" height="540" rx="60" fill="#D9D0C5"/>
  </g>

  <!-- Card 2 (middle) -->
  <g transform="translate(512,512) rotate(3) translate(-310,-340)" filter="url(#cardshadow)">
    <rect width="480" height="560" rx="60" fill="#EAE4DB"/>
  </g>

  <!-- Card 1 (front) -->
  <g transform="translate(200,210)" filter="url(#shadow)">
    <rect width="500" height="580" rx="60" fill="#F5F1ED" stroke="#E8E2DA" stroke-width="2"/>

    <!-- Status dot — terracotta -->
    <circle cx="72" cy="88" r="34" fill="#C97854"/>

    <!-- Status dot small — sage (top right) -->
    <circle cx="416" cy="64" r="22" fill="#6B9E6E" opacity="0.85"/>

    <!-- Progress line 1 — full terracotta -->
    <rect x="56" y="200" width="388" height="48" rx="24" fill="#C97854"/>

    <!-- Progress line 2 — mid -->
    <rect x="56" y="268" width="308" height="48" rx="24" fill="#D4906F"/>

    <!-- Progress line 3 — light -->
    <rect x="56" y="336" width="220" height="48" rx="24" fill="#E2B59A"/>

    <!-- Faint bottom line -->
    <rect x="56" y="430" width="160" height="28" rx="14" fill="#ECE6DE"/>
    <rect x="56" y="470" width="100" height="20" rx="10" fill="#ECE6DE" opacity="0.6"/>
  </g>
</svg>
