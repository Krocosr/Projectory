<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2E2825" flood-opacity="0.14"/>
    </filter>
    <filter id="s2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2E2825" flood-opacity="0.08"/>
    </filter>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>

  <circle cx="200" cy="200" r="200" fill="#F0EBE4"/>

  <g clip-path="url(#circle)">
    <g filter="url(#s1)">
      <!-- Card 3 -->
      <g transform="translate(200,200) rotate(10) translate(-148,-162)">
        <rect width="296" height="344" rx="34" fill="#C8BFB4"/>
      </g>
      <!-- Card 2 -->
      <g transform="translate(200,200) rotate(4) translate(-158,-170)">
        <rect width="308" height="356" rx="34" fill="#DDD7CE"/>
      </g>
      <!-- Card 1 -->
      <g filter="url(#s2)">
        <rect x="22" y="22" width="316" height="366" rx="34" fill="#F5F1ED" stroke="#E0D9CF" stroke-width="1.5"/>
        <circle cx="66" cy="84" r="24" fill="#C97854"/>
        <circle cx="302" cy="60" r="15" fill="#6B9E6E" opacity="0.88"/>
        <rect x="44" y="146" width="270" height="36" rx="18" fill="#C97854"/>
        <rect x="44" y="196" width="214" height="36" rx="18" fill="#D4906F"/>
        <rect x="44" y="246" width="154" height="36" rx="18" fill="#E2B59A"/>
        <rect x="44" y="312" width="106" height="22" rx="11" fill="#ECE6DE"/>
      </g>
    </g>
  </g>
</svg>
