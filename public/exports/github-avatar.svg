<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2E2825" flood-opacity="0.10"/>
    </filter>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>

  <!-- Circle background -->
  <circle cx="200" cy="200" r="200" fill="#F0EBE4"/>

  <g clip-path="url(#circle)">
    <!-- Card 3 -->
    <g transform="translate(200,200) rotate(8) translate(-100,-110)">
      <rect width="170" height="200" rx="20" fill="#D9D0C5"/>
    </g>
    <!-- Card 2 -->
    <g transform="translate(200,200) rotate(3) translate(-110,-118)">
      <rect width="178" height="212" rx="20" fill="#EAE4DB"/>
    </g>
    <!-- Card 1 -->
    <g transform="translate(60,78)" filter="url(#shadow)">
      <rect width="186" height="218" rx="20" fill="#F5F1ED" stroke="#E8E2DA" stroke-width="1"/>
      <circle cx="28" cy="38" r="14" fill="#C97854"/>
      <circle cx="160" cy="26" r="9" fill="#6B9E6E" opacity="0.85"/>
      <rect x="18" y="76" width="150" height="18" rx="9" fill="#C97854"/>
      <rect x="18" y="102" width="118" height="18" rx="9" fill="#D4906F"/>
      <rect x="18" y="128" width="86" height="18" rx="9" fill="#E2B59A"/>
      <rect x="18" y="162" width="60" height="11" rx="5.5" fill="#ECE6DE"/>
    </g>
  </g>
</svg>
