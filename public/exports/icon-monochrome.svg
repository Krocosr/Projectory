<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#ECE6DE"/>

  <!-- Card 3 (back) -->
  <g transform="translate(512,512) rotate(8) translate(-290,-330)">
    <rect width="460" height="540" rx="60" fill="#2E2825" opacity="0.4"/>
  </g>

  <!-- Card 2 (middle) -->
  <g transform="translate(512,512) rotate(3) translate(-310,-340)">
    <rect width="480" height="560" rx="60" fill="#2E2825" opacity="0.6"/>
  </g>

  <!-- Card 1 (front) -->
  <g transform="translate(200,210)" filter="url(#shadow)">
    <rect width="500" height="580" rx="60" fill="#2E2825"/>

    <!-- Status dot — white -->
    <circle cx="72" cy="88" r="34" fill="#ECE6DE"/>

    <!-- Status dot small -->
    <circle cx="416" cy="64" r="22" fill="#ECE6DE" opacity="0.5"/>

    <!-- Progress lines — ivory on dark -->
    <rect x="56" y="200" width="388" height="48" rx="24" fill="#ECE6DE"/>
    <rect x="56" y="268" width="308" height="48" rx="24" fill="#8A7E78"/>
    <rect x="56" y="336" width="220" height="48" rx="24" fill="#8A7E78" opacity="0.7"/>

    <!-- Faint bottom lines -->
    <rect x="56" y="430" width="160" height="28" rx="14" fill="#5C524E"/>
    <rect x="56" y="470" width="100" height="20" rx="10" fill="#5C524E" opacity="0.6"/>
  </g>
</svg>
