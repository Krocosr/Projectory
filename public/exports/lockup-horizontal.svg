<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" width="1400" height="300">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#2E2825" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Icon at 260×260 -->
  <g transform="translate(20,20)" filter="url(#shadow)">
    <rect width="260" height="260" rx="58" fill="#F5F1ED"/>

    <!-- Card 3 -->
    <g transform="translate(130,130) rotate(8) translate(-70,-80)">
      <rect width="110" height="132" rx="14" fill="#D9D0C5"/>
    </g>
    <!-- Card 2 -->
    <g transform="translate(130,130) rotate(3) translate(-76,-86)">
      <rect width="116" height="138" rx="14" fill="#EAE4DB"/>
    </g>
    <!-- Card 1 -->
    <rect x="48" y="50" width="122" height="142" rx="14" fill="#F5F1ED" stroke="#E8E2DA" stroke-width="1"/>

    <!-- Dot -->
    <circle cx="66" cy="72" r="9" fill="#C97854"/>
    <circle cx="154" cy="62" r="6" fill="#6B9E6E" opacity="0.85"/>

    <!-- Lines -->
    <rect x="58" y="98" width="94" height="12" rx="6" fill="#C97854"/>
    <rect x="58" y="116" width="74" height="12" rx="6" fill="#D4906F"/>
    <rect x="58" y="134" width="54" height="12" rx="6" fill="#E2B59A"/>
    <rect x="58" y="158" width="36" height="7" rx="3.5" fill="#ECE6DE"/>
  </g>

  <!-- Wordmark -->
  <text x="320" y="195" font-family="Georgia,'Times New Roman',serif" font-size="148" font-weight="700" fill="#2E2825" letter-spacing="-4">Projectory</text>

  <!-- Tagline -->
  <text x="324" y="242" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="22" fill="#8A7E78" letter-spacing="5">MULTI-PROJECT MANAGER  ·  PERSONAL PROJECT OS</text>
</svg>
