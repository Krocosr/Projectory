<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#2E2825" flood-opacity="0.13"/>
    </filter>
    <filter id="s2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2E2825" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Icon block: 400×400, full bleed to edges -->
  <g filter="url(#s1)">
    <!-- Card 3 -->
    <g transform="translate(200,200) rotate(10) translate(-155,-170)">
      <rect width="310" height="360" rx="36" fill="#C8BFB4"/>
    </g>
    <!-- Card 2 -->
    <g transform="translate(200,200) rotate(4) translate(-165,-178)">
      <rect width="320" height="374" rx="36" fill="#DDD7CE"/>
    </g>
    <!-- Card 1 -->
    <g filter="url(#s2)">
      <rect x="24" y="24" width="330" height="368" rx="36" fill="#F5F1ED" stroke="#E0D9CF" stroke-width="1.5"/>
      <circle cx="72" cy="90" r="26" fill="#C97854"/>
      <circle cx="314" cy="66" r="16" fill="#6B9E6E" opacity="0.88"/>
      <rect x="48" y="156" width="282" height="38" rx="19" fill="#C97854"/>
      <rect x="48" y="208" width="224" height="38" rx="19" fill="#D4906F"/>
      <rect x="48" y="260" width="162" height="38" rx="19" fill="#E2B59A"/>
      <rect x="48" y="326" width="110" height="24" rx="12" fill="#ECE6DE"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="448" y="276" font-family="Georgia,'Times New Roman',serif" font-size="190" font-weight="700" fill="#2E2825" letter-spacing="-6">Projectory</text>
  <!-- Tagline -->
  <text x="452" y="340" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="28" fill="#8A7E78" letter-spacing="6">MULTI-PROJECT MANAGER  ·  PERSONAL PROJECT OS</text>
</svg>
